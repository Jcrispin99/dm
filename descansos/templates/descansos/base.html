<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Reporte DM{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --bg: #f5f7fa;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --ok: #16a34a;
      --warn: #d97706;
      --err: #dc2626;
      --border: #e5e7eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      gap: 24px;
      align-items: center;
    }
    header h1 { font-size: 18px; margin: 0; }
    header nav a {
      color: var(--text);
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 6px;
    }
    header nav a:hover { background: var(--bg); }
    header nav a.active { background: var(--primary); color: white; }
    main { padding: 24px; max-width: 1400px; margin: 0 auto; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }
    h2 { margin-top: 0; font-size: 16px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    .filters {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: end;
    }
    .filters label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .filters input, .filters select {
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 14px;
    }
    .btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .btn:hover { opacity: 0.9; }
    .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
    .summary { display: flex; gap: 16px; flex-wrap: wrap; }
    .summary .stat { flex: 1 1 150px; }
    .summary .num { font-size: 28px; font-weight: 600; }
    .summary .lbl { font-size: 12px; color: var(--muted); text-transform: uppercase; }
    .alert { padding: 12px; border-radius: 6px; margin-bottom: 12px; }
    .alert-ok { background: #ecfdf5; color: var(--ok); border: 1px solid #a7f3d0; }
    .alert-warn { background: #fffbeb; color: var(--warn); border: 1px solid #fcd34d; }
    .alert-err { background: #fef2f2; color: var(--err); border: 1px solid #fca5a5; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    table th, table td { padding: 6px 8px; text-align: left; border-bottom: 1px solid var(--border); }
    table th { background: var(--bg); font-weight: 600; }
    canvas { max-height: 320px; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <header>
    <h1>Reporte de Descansos Médicos</h1>
    <nav style="flex: 1;">
      <a href="{% url 'descansos:dashboard' %}" class="{% if active == 'dashboard' %}active{% endif %}">Dashboard</a>
      <a href="{% url 'descansos:pacientes' %}" class="{% if active == 'pacientes' %}active{% endif %}">Pacientes</a>
      <a href="{% url 'descansos:upload' %}" class="{% if active == 'upload' %}active{% endif %}">Cargar Excel</a>
      <a href="/admin/">Admin</a>
    </nav>
    {% if user.is_authenticated %}
      <div style="color: var(--muted); font-size: 13px;">{{ user.username }}</div>
      <form method="post" action="{% url 'logout' %}" style="display:inline;">
        {% csrf_token %}
        <button type="submit" class="btn btn-secondary" style="padding: 4px 12px; font-size: 13px;">Salir</button>
      </form>
    {% endif %}
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  {% block extra_body %}{% endblock %}
</body>
</html>
